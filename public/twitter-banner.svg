<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c026d3"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="250" fill="url(#shine)"/>
  <!-- Decorative circles -->
  <circle cx="200" cy="250" r="320" fill="white" opacity="0.04"/>
  <circle cx="1300" cy="250" r="280" fill="white" opacity="0.04"/>
  <circle cx="750" cy="400" r="200" fill="white" opacity="0.03"/>
  <!-- Logo text -->
  <text x="750" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="72" fill="white" letter-spacing="-1">
    <tspan fill="white">Vibrant</tspan><tspan fill="rgba(255,255,255,0.9)">Social</tspan>
  </text>
</svg>
