<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="100%" style="stop-color:#27272a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="12"/>
  <!-- Header -->
  <rect x="0" y="0" width="600" height="48" fill="#09090b" rx="12"/>
  <rect x="0" y="12" width="600" height="36" fill="#09090b"/>
  <rect x="20" y="16" width="80" height="14" rx="7" fill="#06b6d4"/>
  <!-- Compose area -->
  <rect x="30" y="70" width="540" height="240" rx="12" fill="#27272a"/>
  <!-- Toolbar -->
  <rect x="45" y="85" width="510" height="36" rx="8" fill="#3f3f46"/>
  <circle cx="68" cy="103" r="10" fill="#52525b"/>
  <circle cx="96" cy="103" r="10" fill="#52525b"/>
  <circle cx="124" cy="103" r="10" fill="#52525b"/>
  <circle cx="152" cy="103" r="10" fill="#52525b"/>
  <circle cx="180" cy="103" r="10" fill="#52525b"/>
  <!-- Text content lines -->
  <rect x="55" y="140" width="400" height="10" rx="5" fill="#d4d4d8"/>
  <rect x="55" y="162" width="350" height="10" rx="5" fill="#d4d4d8"/>
  <rect x="55" y="184" width="280" height="10" rx="5" fill="#d4d4d8"/>
  <!-- Cursor blink line -->
  <rect x="55" y="210" width="2" height="16" fill="#06b6d4"/>
  <!-- Bottom toolbar -->
  <rect x="45" y="265" width="510" height="32" rx="8" fill="#3f3f46"/>
  <circle cx="68" cy="281" r="8" fill="#52525b"/>
  <circle cx="92" cy="281" r="8" fill="#52525b"/>
  <circle cx="116" cy="281" r="8" fill="#52525b"/>
  <!-- Post button -->
  <rect x="460" y="330" width="100" height="36" rx="18" fill="#06b6d4"/>
