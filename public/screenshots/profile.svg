<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="100%" style="stop-color:#27272a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="12"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="600" height="48" fill="#09090b" rx="12"/>
  <rect x="0" y="12" width="600" height="36" fill="#09090b"/>
  <circle cx="30" cy="24" r="10" fill="#a855f7"/>
  <rect x="50" y="18" width="80" height="12" rx="6" fill="#3f3f46"/>
  <!-- Profile avatar -->
  <circle cx="300" cy="120" r="48" fill="#a855f7" opacity="0.3"/>
  <circle cx="300" cy="120" r="44" fill="#d946ef" opacity="0.5"/>
  <!-- Name -->
  <rect x="220" y="185" width="160" height="16" rx="8" fill="#e4e4e7"/>
  <rect x="240" y="210" width="120" height="10" rx="5" fill="#71717a"/>
  <!-- Bio lines -->
  <rect x="120" y="245" width="360" height="10" rx="5" fill="#3f3f46"/>
  <rect x="150" y="265" width="300" height="10" rx="5" fill="#3f3f46"/>
  <rect x="170" y="285" width="260" height="10" rx="5" fill="#3f3f46"/>
  <!-- Action buttons -->
  <rect x="180" y="320" width="100" height="32" rx="16" fill="#d946ef"/>
  <rect x="300" y="320" width="100" height="32" rx="16" fill="#27272a" stroke="#d946ef" stroke-width="1"/>
</svg>