<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c026d3"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="400" height="400" rx="88" ry="88"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <rect width="400" height="400" fill="url(#bg)"/>
    <rect width="400" height="400" fill="url(#shine)"/>
    <!-- Decorative circle -->
    <circle cx="320" cy="320" r="200" fill="white" opacity="0.04"/>
  </g>
  <text x="200" y="225" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="180" fill="white" letter-spacing="-8">VS</text>
</svg>
