<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <clipPath id="rounded">
      <rect width="400" height="400" rx="88" ry="88"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Gray background -->
    <rect width="400" height="400" fill="#18181b"/>
    <!-- Subtle decorative circle -->
    <circle cx="320" cy="320" r="200" fill="white" opacity="0.02"/>
  </g>
  <!-- V in fuchsia-600, S in blue-600 -->
  <text x="200" y="225" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="180" letter-spacing="-8">
    <tspan fill="#c026d3">V</tspan><tspan fill="#2563eb">S</tspan>
  </text>
</svg>
